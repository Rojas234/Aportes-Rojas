<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aportes Rojas | Comunidad SA:MP</title>
    <style>
        :root {
            --gta-orange: #f39c12;
            --dark-bg: #0d0d0d;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --danger: #ff4757;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark-bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        header { background-color: #000; padding: 20px; text-align: center; border-bottom: 4px solid var(--gta-orange); }
        .main-container { max-width: 800px; margin: 30px auto; padding: 0 20px; }

        /* Panel Admin (Oculto por defecto) */
        #admin-panel {
            display: none; 
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 2px dashed var(--gta-orange);
        }

        input, textarea {
            width: 100%; padding: 12px; margin-bottom: 10px;
            background: #252525; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box;
        }

        .btn-post { background: var(--gta-orange); color: black; border: none; padding: 12px; font-weight: bold; width: 100%; border-radius: 6px; cursor: pointer; }
        
        /* Login */
        .login-area { text-align: right; margin-bottom: 20px; }
        .btn-login { background: transparent; color: var(--gta-orange); border: 1px solid var(--gta-orange); padding: 5px 15px; cursor: pointer; border-radius: 4px; }

        /* Aportes */
        .aporte-item {
            background: var(--card-bg); padding: 15px; border-radius: 10px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center; border-left: 6px solid var(--gta-orange);
        }

        .btn-delete { background: var(--danger); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; display: none; } /* Oculto para visitantes */
        .btn-link { color: var(--gta-orange); text-decoration: none; font-weight: bold; padding: 10px; border: 1px solid #333; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <h1>Aportes Rojas</h1>
</header>

<div class="main-container">
    <div class="login-area">
        <button class="btn-login" id="loginBtn" onclick="toggleAdmin()">🔑 Acceso Admin</button>
    </div>

    <section id="admin-panel">
        <h2 style="color: var(--gta-orange); margin-top: 0;">Panel de Administración</h2>
        <input type="text" id="titulo" placeholder="Nombre del aporte">
        <textarea id="desc" rows="2" placeholder="Descripción"></textarea>
        <input type="text" id="link" placeholder="URL de descarga">
        <button class="btn-post" onclick="crearAporte()">Publicar Aporte</button>
        <button onclick="cerrarSesion()" style="background:none; color:gray; border:none; cursor:pointer; margin-top:10px;">Cerrar Sesión</button>
    </section>

    <div id="contenedor-lista"></div>
</div>

<script>
    // --- CONFIGURACIÓN DE TU CUENTA ---
    const ADMIN_EMAIL = "GolloMods@gmail.com"; 
    const ADMIN_PASS = "1108644659"; // Cambia esto por tu contraseña secreta
    let esAdmin = false;

    window.onload = mostrarAportes;

    function toggleAdmin() {
        const email = prompt("Introduce tu correo:");
        const pass = prompt("Introduce tu contraseña:");

        if(email === ADMIN_EMAIL && pass === ADMIN_PASS) {
            esAdmin = true;
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('loginBtn').innerText = "🔓 Admin Activo";
            mostrarAportes(); // Refrescar para mostrar botones de borrar
            alert("Bienvenido, Rojas.");
        } else {
            alert("Acceso denegado. Solo lectura disponible.");
        }
    }

    function cerrarSesion() {
        esAdmin = false;
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('loginBtn').innerText = "🔑 Acceso Admin";
        mostrarAportes();
    }

    function crearAporte() {
        const t = document.getElementById('titulo').value;
        const d = document.getElementById('desc').value;
        const l = document.getElementById('link').value;

        if(!t || !d || !l) return;

        const nuevo = { id: Date.now(), titulo: t, desc: d, link: l };
        let datos = JSON.parse(localStorage.getItem('aportes_db')) || [];
        datos.unshift(nuevo);
        localStorage.setItem('aportes_db', JSON.stringify(datos));
        
        mostrarAportes();
    }

    function mostrarAportes() {
        const lista = document.getElementById('contenedor-lista');
        let datos = JSON.parse(localStorage.getItem('aportes_db')) || [];
        lista.innerHTML = "";

        datos.forEach(item => {
            // El botón de eliminar SOLO se crea con "display: block" si esAdmin es true
            const styleDelete = esAdmin ? 'display: block' : 'display: none';

            lista.innerHTML += `
                <div class="aporte-item">
                    <div class="aporte-info">
                        <h3>${item.titulo}</h3>
                        <p>${item.desc}</p>
                    </div>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <a href="${item.link}" target="_blank" class="btn-link">DESCARGAR</a>
                        <button class="btn-delete" style="${styleDelete}" onclick="borrarAporte(${item.id})">BORRAR</button>
                    </div>
                </div>
            `;
        });
    }

    function borrarAporte(id) {
        if(!esAdmin) return;
        if(confirm("¿Eliminar aporte?")) {
            let datos = JSON.parse(localStorage.getItem('aportes_db'));
            datos = datos.filter(i => i.id !== id);
            localStorage.setItem('aportes_db', JSON.stringify(datos));
            mostrarAportes();
        }
    }
</script>

</body>
</html>
