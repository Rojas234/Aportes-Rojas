<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aportes Rojas | Administración</title>
    <style>
        :root {
            --gta-orange: #f39c12;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --input-bg: #2a2a2a;
            --text: #ffffff;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #000;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--gta-orange);
        }

        header h1 { margin: 0; color: var(--gta-orange); letter-spacing: 2px; text-transform: uppercase; }

        .main-container { max-width: 800px; margin: 30px auto; padding: 20px; }

        /* Formulario */
        .upload-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 40px;
            border: 1px solid #333;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--gta-orange); }

        input, textarea {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .btn-post {
            background: var(--gta-orange);
            color: black;
            border: none;
            padding: 15px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            border-radius: 5px;
            transition: 0.3s;
        }

        /* Lista de Aportes */
        .aporte-item {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--gta-orange);
            position: relative;
        }

        .aporte-info h3 { margin: 0; color: white; }
        .aporte-info p { margin: 5px 0 0; color: #aaa; font-size: 0.9rem; }

        .acciones { display: flex; gap: 10px; align-items: center; }

        .btn-dl {
            background: #333;
            color: var(--gta-orange);
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
            border: 1px solid var(--gta-orange);
        }

        .btn-delete {
            background: var(--danger);
            color: white;
            border: none;
            padding: 10px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-delete:hover { background: #c0392b; }
    </style>
</head>
<body>

<header>
    <h1>APORTES ROJAS</h1>
</header>

<div class="main-container">
    
    <section class="upload-section">
        <div class="form-group">
            <label>Nombre del aporte</label>
            <input type="text" id="titulo" placeholder="Ej: Sistema de Inventario">
        </div>
        <div class="form-group">
            <label>Descripción</label>
            <textarea id="desc" rows="2" placeholder="Detalles del mod..."></textarea>
        </div>
        <div class="form-group">
            <label>Link de descarga</label>
            <input type="text" id="link" placeholder="https://...">
        </div>
        <button class="btn-post" onclick="agregarAporte()">Publicar ahora</button>
    </section>

    <h2 style="border-bottom: 2px solid #333; padding-bottom: 10px;">Gestión de Publicaciones</h2>
    <div id="lista-aportes"></div>
</div>

<script>
    // 1. Cargar aportes guardados al abrir la página
    document.addEventListener('DOMContentLoaded', mostrarAportes);

    function agregarAporte() {
        const titulo = document.getElementById('titulo').value;
        const descripcion = document.getElementById('desc').value;
        const enlace = document.getElementById('link').value;

        if(!titulo || !descripcion || !enlace) return alert("Completa todo.");

        const aporte = {
            id: Date.now(), // ID único basado en el tiempo
            titulo,
            descripcion,
            enlace
        };

        // Guardar en LocalStorage
        let aportes = JSON.parse(localStorage.getItem('misAportes')) || [];
        aportes.unshift(aporte);
        localStorage.setItem('misAportes', JSON.stringify(aportes));

        // Limpiar campos y refrescar lista
        document.getElementById('titulo').value = "";
        document.getElementById('desc').value = "";
        document.getElementById('link').value = "";
        mostrarAportes();
    }

    function mostrarAportes() {
        const lista = document.getElementById('lista-aportes');
        const aportes = JSON.parse(localStorage.getItem('misAportes')) || [];
        
        lista.innerHTML = "";

        aportes.forEach(a => {
            lista.innerHTML += `
                <div class="aporte-item">
                    <div class="aporte-info">
                        <h3>${a.titulo}</h3>
                        <p>${a.descripcion}</p>
                    </div>
                    <div class="acciones">
                        <a href="${a.enlace}" target="_blank" class="btn-dl">Link</a>
                        <button class="btn-delete" onclick="eliminarAporte(${a.id})">Eliminar</button>
                    </div>
                </div>
            `;
        });
    }

    function eliminarAporte(id) {
        if(confirm("¿Seguro que quieres borrar este aporte?")) {
            let aportes = JSON.parse(localStorage.getItem('misAportes'));
            // Filtrar la lista para quitar el que tiene ese ID
            aportes = aportes.filter(a => a.id !== id);
            localStorage.setItem('misAportes', JSON.stringify(aportes));
            mostrarAportes();
        }
    }
</script>

</body>
</html>
