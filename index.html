<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aportes Rojas | Gestión</title>
    <style>
        :root {
            --gta-orange: #f39c12;
            --dark-bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --input-bg: #252525;
            --text: #ffffff;
            --danger: #ff4757;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 50px;
        }

        header {
            background-color: #000;
            padding: 25px;
            text-align: center;
            border-bottom: 4px solid var(--gta-orange);
            text-transform: uppercase;
        }

        .main-container {
            max-width: 700px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Formulario */
        .upload-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: var(--input-bg);
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn-post {
            background: var(--gta-orange);
            color: black;
            border: none;
            padding: 12px;
            font-weight: bold;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Lista de Aportes */
        .aporte-item {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 6px solid var(--gta-orange);
        }

        .aporte-info h3 { margin: 0; color: var(--gta-orange); }
        .aporte-info p { margin: 5px 0 0; color: #ccc; font-size: 0.9rem; }

        .btn-delete {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-delete:hover {
            background: #ff6b81;
            transform: scale(1.05);
        }

        .btn-link {
            color: var(--gta-orange);
            text-decoration: none;
            margin-right: 15px;
            font-size: 0.9rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>Aportes Rojas - SA:MP</h1>
</header>

<div class="main-container">
    
    <section class="upload-section">
        <input type="text" id="titulo" placeholder="Nombre del aporte">
        <textarea id="desc" rows="2" placeholder="Descripción breve"></textarea>
        <input type="text" id="link" placeholder="Link (Mega, Mediafire, etc)">
        <button class="btn-post" onclick="crearAporte()">Publicar</button>
    </section>

    <div id="contenedor-lista">
        </div>

</div>

<script>
    // Al cargar la página, mostramos lo que esté guardado
    window.onload = mostrarAportes;

    function crearAporte() {
        const t = document.getElementById('titulo').value;
        const d = document.getElementById('desc').value;
        const l = document.getElementById('link').value;

        if(!t || !d || !l) return alert("Por favor, llena todos los campos.");

        const nuevoAporte = {
            id: Date.now(), // ID único para poder eliminarlo después
            titulo: t,
            desc: d,
            link: l
        };

        // Guardar en la memoria del navegador
        let datos = JSON.parse(localStorage.getItem('aportes_db')) || [];
        datos.unshift(nuevoAporte);
        localStorage.setItem('aportes_db', JSON.stringify(datos));

        // Limpiar y actualizar
        document.getElementById('titulo').value = "";
        document.getElementById('desc').value = "";
        document.getElementById('link').value = "";
        mostrarAportes();
    }

    function mostrarAportes() {
        const lista = document.getElementById('contenedor-lista');
        let datos = JSON.parse(localStorage.getItem('aportes_db')) || [];
        
        lista.innerHTML = "";

        datos.forEach(item => {
            lista.innerHTML += `
                <div class="aporte-item" id="item-${item.id}">
                    <div class="aporte-info">
                        <h3>${item.titulo}</h3>
                        <p>${item.desc}</p>
                    </div>
                    <div>
                        <a href="${item.link}" target="_blank" class="btn-link">LINK</a>
                        <button class="btn-delete" onclick="borrarAporte(${item.id})">ELIMINAR</button>
                    </div>
                </div>
            `;
        });
    }

    function borrarAporte(id) {
        if(confirm("¿Estás seguro de eliminar este aporte?")) {
            let datos = JSON.parse(localStorage.getItem('aportes_db'));
            // Filtramos la lista: dejamos todos menos el que tiene el ID que queremos borrar
            datos = datos.filter(item => item.id !== id);
            localStorage.setItem('aportes_db', JSON.stringify(datos));
            
            // Refrescar la vista
            mostrarAportes();
        }
    }
</script>

</body>
</html>
