<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aportes Rojas | Panel Activo</title>
    <style>
        :root {
            --gta-orange: #f39c12;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --input-bg: #2a2a2a;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #000;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--gta-orange);
        }

        header h1 {
            margin: 0;
            color: var(--gta-orange);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .main-container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
        }

        /* Formulario */
        .upload-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 40px;
            border: 1px solid #333;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--gta-orange); }

        input, textarea {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .btn-post {
            background: var(--gta-orange);
            color: black;
            border: none;
            padding: 15px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-post:hover { background: #e67e22; transform: scale(1.01); }

        /* Lista de Aportes */
        .aporte-item {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--gta-orange);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .aporte-info h3 { margin: 0; color: white; }
        .aporte-info p { margin: 5px 0 0; color: #aaa; font-size: 0.9rem; }

        .btn-dl {
            background: #333;
            color: var(--gta-orange);
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            border: 1px solid var(--gta-orange);
        }

        .btn-dl:hover { background: var(--gta-orange); color: black; }
    </style>
</head>
<body>

<header>
    <h1>APORTES ROJAS</h1>
</header>

<div class="main-container">
    
    <section class="upload-section">
        <div class="form-group">
            <label>Nombre del aporte</label>
            <input type="text" id="titulo" placeholder="Ej: Nuevo mapa de Interiores">
        </div>
        <div class="form-group">
            <label>Descripción</label>
            <textarea id="desc" rows="2" placeholder="¿Qué incluye este mod?"></textarea>
        </div>
        <div class="form-group">
            <label>Link de descarga</label>
            <input type="text" id="link" placeholder="https://mediafire.com/...">
        </div>
        <button class="btn-post" onclick="publicar()">Publicar ahora</button>
    </section>

    <h2 style="border-bottom: 2px solid #333; padding-bottom: 10px;">Aportes Recientes</h2>
    <div id="lista-aportes">
        <div class="aporte-item">
            <div class="aporte-info">
                <h3>Base Gamemode RP</h3>
                <p>Una base limpia para empezar tu servidor de Roleplay.</p>
            </div>
            <a href="#" class="btn-dl">Descargar</a>
        </div>
    </div>
</div>

<script>
    function publicar() {
        // Obtener valores de los campos
        const titulo = document.getElementById('titulo').value;
        const descripcion = document.getElementById('desc').value;
        const enlace = document.getElementById('link').value;

        // Validar que no estén vacíos
        if(titulo === "" || descripcion === "" || enlace === "") {
            alert("Por favor, completa todos los campos.");
            return;
        }

        // Crear el nuevo elemento de la lista
        const lista = document.getElementById('lista-aportes');
        const nuevoAporte = document.createElement('div');
        nuevoAporte.className = 'aporte-item';

        nuevoAporte.innerHTML = `
            <div class="aporte-info">
                <h3>${titulo}</h3>
                <p>${descripcion}</p>
            </div>
            <a href="${enlace}" target="_blank" class="btn-dl">Descargar</a>
        `;

        // Añadirlo al principio de la lista
        lista.insertBefore(nuevoAporte, lista.firstChild);

        // Limpiar el formulario
        document.getElementById('titulo').value = "";
        document.getElementById('desc').value = "";
        document.getElementById('link').value = "";
    }
</script>

</body>
</html>
