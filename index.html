<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aportes Rojas</title>
    <style>
        :root {
            --primario: #2c3e50;
            --secundario: #3498db;
            --fondo: #f8f9fa;
            --texto: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--primario);
            color: white;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        main {
            flex: 1;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .contenedor-aportes {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid var(--secundario);
        }

        h1 { margin: 0; font-size: 2.5rem; }
        p { line-height: 1.6; color: #666; }

        .boton-accion {
            display: inline-block;
            margin-top: 1rem;
            padding: 12px 24px;
            background-color: var(--secundario);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .boton-accion:hover {
            background-color: #2980b9;
        }

        footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <h1>Aportes Rojas</h1>
    </header>

    <main>
        <div class="contenedor-aportes">
            <h2>Bienvenido a la plataforma</h2>
            <p>Este es el espacio dedicado a la gestión y visualización de contenidos de <strong>Aportes Rojas</strong>. Aquí podrás encontrar información relevante y organizada.</p>
            
            <button class="boton-accion" onclick="mensaje()">Explorar contenido</button>
        </div>
    </main>

    <footer>
        &copy; 2026 Aportes Rojas - Todos los derechos reservados.
    </footer>

    <script>
        function mensaje() {
            alert('¡Bienvenido a Aportes Rojas! Pronto verás más contenido aquí.');
        }
    </script>

</body>
</html>
