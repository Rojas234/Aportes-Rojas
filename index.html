<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aportes Rojas | SA:MP Community</title>
    <style>
        :root {
            --gta-orange: #f39c12;
            --dark-bg: #0d0d0d;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --danger: #ff4757;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark-bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        header { background-color: #000; padding: 25px; text-align: center; border-bottom: 4px solid var(--gta-orange); }
        header h1 { margin: 0; color: var(--gta-orange); text-transform: uppercase; letter-spacing: 2px; }
        
        .main-container { max-width: 800px; margin: 30px auto; padding: 0 20px; }

        /* Login Area */
        .login-area { text-align: right; margin-bottom: 20px; }
        .btn-login { background: transparent; color: var(--gta-orange); border: 1px solid var(--gta-orange); padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }

        /* Admin Panel */
        #admin-panel {
            display: none; 
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 2px dashed var(--gta-orange);
        }

        input, textarea {
            width: 100%; padding: 12px; margin-bottom: 10px;
            background: #252525; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box;
        }

        .btn-post { background: var(--gta-orange); color: black; border: none; padding: 15px; font-weight: bold; width: 100%; border-radius: 6px; cursor: pointer; text-transform: uppercase; }

        /* Lista de Aportes */
        .aporte-item {
            background: var(--card-bg); padding: 20px; border-radius: 10px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center; border-left: 6px solid var(--gta-orange);
            transition: 0.3s;
        }
        .aporte-item:hover { transform: translateX(5px); }
        .aporte-info h3 { margin: 0; color: var(--gta-orange); font-size: 1.4rem; }
        .aporte-info p { margin: 8px 0 0; color: #bbb; font-size: 0.95rem; }

        .acciones { display: flex; gap: 10px; align-items: center; }
        .btn-link { color: white; text-decoration: none; font-weight: bold; padding: 10px 20px; background: #333; border-radius: 5px; border: 1px solid var(--gta-orange); }
        .btn-link:hover { background: var(--gta-orange); color: black; }
        
        .btn-delete { background: var(--danger); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; display: none; }
    </style>
</head>
<body>

<header>
    <h1>Aportes Rojas</h1>
</header>

<div class="main-container">
    <div class="login-area">
        <button class="btn-login" id="loginBtn" onclick="toggleAdmin()">🔑 MODO ADMIN</button>
    </div>

    <section id="admin-panel">
        <h2 style="color: var(--gta-orange); margin-top: 0;">Panel de Administración</h2>
        <input type="text" id="titulo" placeholder="Nombre del mod o script">
        <textarea id="desc" rows="2" placeholder="Descripción detallada del aporte"></textarea>
        <input type="text" id="link" placeholder="Enlace de descarga (Mediafire, Mega, etc.)">
        <button class="btn-post" onclick="crearAporte()">Publicar para la Comunidad</button>
        <button onclick="cerrarSesion()" style="background:none; color:gray; border:none; cursor:pointer; margin-top:15px; text-decoration:underline;">Cerrar Sesión Admin</button>
    </section>

    <h2 style="border-bottom: 2px solid #333; padding-bottom: 10px;">Últimos Aportes</h2>
    <div id="contenedor-lista">
        </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    // Configuración con tus datos de la captura
    const firebaseConfig = {
        apiKey: "AIzaSyC7T8orPh8UTcbbOZOVJmXc7gmBP37rMkc",
        authDomain: "aportes-rojas.firebaseapp.com",
        projectId: "aportes-rojas",
        storageBucket: "aportes-rojas.firebasestorage.app",
        messagingSenderId: "621972445013",
        appId: "1:621972445013:web:42aa3674b1d8f3143701dc",
        measurementId: "G-GQ8ZVBTY70",
        databaseURL: "https://aportes-rojas-default-rtdb.firebaseio.com"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Tu cuenta de Admin
    const ADMIN_EMAIL = "admin@rojas.com"; 
    const ADMIN_PASS = "1108644659"; 
    let esAdmin = false;

    // Cargar aportes en tiempo real
    db.ref('aportes').on('value', (snapshot) => {
        const lista = document.getElementById('contenedor-lista');
        lista.innerHTML = "";
        const datos = snapshot.val();

        if (datos) {
            Object.keys(datos).reverse().forEach(id => {
                const item = datos[id];
                const displayDelete = esAdmin ? 'block' : 'none';

                lista.innerHTML += `
                    <div class="aporte-item">
                        <div class="aporte-info">
                            <h3>${item.titulo}</h3>
                            <p>${item.desc}</p>
                        </div>
                        <div class="acciones">
                            <a href="${item.link}" target="_blank" class="btn-link">DESCARGAR</a>
                            <button class="btn-delete" style="display:${displayDelete}" onclick="borrarAporte('${id}')">BORRAR</button>
                        </div>
                    </div>
                `;
            });
        } else {
            lista.innerHTML = "<p style='color:gray;'>No hay aportes todavía.</p>";
        }
    });

    // Función para subir a la nube
    function crearAporte() {
        if(!esAdmin) return;
        const t = document.getElementById('titulo').value;
        const d = document.getElementById('desc').value;
        const l = document.getElementById('link').value;

        if(!t || !d || !l) return alert("Rellena todos los campos");

        db.ref('aportes').push({
            titulo: t,
            desc: d,
            link: l,
            timestamp: Date.now()
        }).then(() => {
            document.getElementById('titulo').value = "";
            document.getElementById('desc').value = "";
            document.getElementById('link').value = "";
        });
    }

    // Función para borrar de la nube
    function borrarAporte(id) {
        if(esAdmin && confirm("¿Eliminar este aporte permanentemente?")) {
            db.ref('aportes/' + id).remove();
        }
    }

    // Login
    function toggleAdmin() {
        const correo = prompt("Ingresa el correo de Admin:");
        const pass = prompt("Ingresa la contraseña:");

        if(correo === ADMIN_EMAIL && pass === ADMIN_PASS) {
            esAdmin = true;
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('loginBtn').innerText = "🔓 ADMIN: ONLINE";
            // Forzar actualización visual
            db.ref('aportes').once('value', () => {});
        } else {
            alert("Acceso incorrecto. Los visitantes solo pueden descargar.");
        }
    }

    function cerrarSesion() {
        esAdmin = false;
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('loginBtn').innerText = "🔑 MODO ADMIN";
        db.ref('aportes').once('value', () => {});
    }
</script>

</body>
</html>
